<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crassus 2.5 — Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .login-panel {
            width: min(420px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px 28px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
        }

        .login-panel h1 {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .login-panel h1 span {
            color: var(--accent);
        }

        .login-panel p {
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 14px;
        }

        .login-panel label {
            display: block;
            margin-bottom: 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .login-panel input[type="password"] {
            width: 100%;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: var(--radius);
            padding: 12px 14px;
            font-size: 14px;
            outline: none;
            margin-bottom: 16px;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .login-panel input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
        }

        .login-panel button[type="submit"] {
            width: 100%;
            border: none;
            border-radius: var(--radius);
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 700;
            color: #0c1524;
            background: var(--accent);
            cursor: pointer;
            transition: background var(--transition);
        }

        .login-panel button[type="submit"]:hover {
            background: var(--accent-hover);
        }

        .login-error {
            margin-bottom: 14px;
            padding: 12px 14px;
            border-radius: var(--radius);
            color: #fff;
            background: var(--red-bg);
            border: 1px solid var(--red-border);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <form class="login-panel" method="post" action="/login">
        <h1>Crassus <span>2.5</span></h1>
        <p>Enter the shared dashboard password to view webhook activity, settings, and broker snapshots.</p>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <input type="hidden" name="next" value="{{ next_url }}">

        <label for="password">Dashboard Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required autofocus>

        <button type="submit">Open Dashboard</button>
    </form>
</body>
</html>
